name: Daily digest to GitHub Pages

on:
  schedule:
    # 13:25 UTC daily — adjust to taste. arXiv announces Sun–Thu evenings (US Eastern),
    # so a morning-UTC run picks up the latest announcement.
    - cron: "25 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # No SendGrid / SMTP secrets needed anymore — we publish instead of emailing.
        run: python src/action.py

      - name: Archive today's digest
        run: |
          mkdir -p docs/digests
          cp digest.html "docs/digests/$(date -u +%F).html"

      - name: Rebuild index and stats
        run: python src/build_site.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Digest $(date -u +%F)" || echo "Nothing to commit"
          git push
